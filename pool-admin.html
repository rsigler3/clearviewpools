<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Admin Backend | Clearview Pools</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    "colors": {
                        "primary": "#00B4D8",
                        "secondary": "#006479",
                        "surface": "#eff8fe",
                    },
                    "fontFamily": {
                        "body": ["Plus Jakarta Sans"],
                    }
                },
            },
        }
    </script>
    <style>
        .bubble-shadow { box-shadow: 0 30px 60px rgba(0, 100, 121, 0.15); }
    </style>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://pddrwxvauofsnchcmodn.supabase.co';
        const supabaseKey = 'sb_publishable_w_x9uuDPvOxYBpEr8Q4k6Q_ZHNAbMuX';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
    </script>
</head>

<body class="bg-[#f6fafe] font-body text-[#273034] min-h-screen py-12 px-6">
    <!-- Simple Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 z-[100] bg-background/95 backdrop-blur-md flex flex-col items-center justify-center transition-all duration-500">
        <div class="bg-white p-10 rounded-[2.5rem] bubble-shadow max-w-sm w-full text-center">
            <h2 class="text-3xl font-black text-secondary mb-2">Admin Login</h2>
            <p class="text-on-surface-variant mb-8 font-medium">Please verify your identity.</p>
            <input type="password" id="admin-passcode" class="w-full bg-surface border-2 border-transparent focus:border-primary rounded-full px-6 py-4 outline-none text-center font-bold text-xl mb-4 transition-all" placeholder="Enter Passcode">
            <button onclick="checkAuth()" class="w-full bg-primary hover:bg-secondary text-white py-4 rounded-full font-black text-lg transition-all hover:scale-105 active:scale-95">Enter Admin Panel</button>
            <p id="login-error" class="text-red-500 font-bold mt-4 hidden">Incorrect Passcode</p>
        </div>
    </div>

    <div class="max-w-3xl mx-auto">
        <div class="flex flex-col md:flex-row items-center justify-between mb-10 gap-4">
            <h1 class="text-3xl font-black text-secondary">Pool Skool Admin</h1>
            <div class="flex items-center gap-4">
                <a href="pool-skool.html" class="text-primary font-bold hover:underline">View Live Blog &rarr;</a>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] p-10 bubble-shadow">
            <h2 class="text-2xl font-bold mb-8">Publish New Article</h2>
            
            <form id="post-form" class="space-y-6">
                <!-- Title -->
                <div class="space-y-2">
                    <label class="text-sm font-black text-primary uppercase ml-4">Article Title</label>
                    <input required id="title" class="w-full bg-surface border-2 border-transparent focus:border-primary rounded-full px-6 py-4 outline-none transition-all" placeholder="Enter an engaging title" type="text">
                </div>

                <!-- Image Upload -->
                <div class="space-y-2">
                    <label class="text-sm font-black text-primary uppercase ml-4">Cover Image Upload</label>
                    <div class="flex items-center gap-4">
                        <input id="featured_image_file" class="w-full bg-surface border-2 border-transparent focus:border-primary rounded-full px-6 py-3 outline-none transition-all" type="file" accept="image/*">
                        <input type="hidden" id="featured_image_url">
                    </div>
                    <div id="image-preview" class="hidden mt-4 w-32 h-32 rounded-2xl overflow-hidden shadow-md">
                        <img id="image-preview-img" src="" class="w-full h-full object-cover">
                    </div>
                </div>

                <!-- Excerpt -->
                <div class="space-y-2">
                    <label class="text-sm font-black text-primary uppercase ml-4">Short Excerpt</label>
                    <textarea required id="excerpt" class="w-full bg-surface border-2 border-transparent focus:border-primary rounded-[1.5rem] px-6 py-3 outline-none transition-all" placeholder="Enter a brief summary (shows on the blog grid)" rows="3"></textarea>
                </div>

                <!-- Rich Text Content -->
                <div class="space-y-2">
                    <label class="text-sm font-black text-primary uppercase ml-4">Full Article Content</label>
                    <div class="bg-white rounded-2xl overflow-hidden border-2 border-surface focus-within:border-primary transition-all">
                        <div id="editor-container" style="height: 300px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px;"></div>
                    </div>
                </div>

                <!-- Messages -->
                <div id="status-message" class="hidden font-bold py-3 px-6 rounded-full text-center"></div>

                <button type="submit" id="submit-btn" class="w-full bg-primary hover:bg-secondary text-white py-4 rounded-full font-black text-xl transition-all hover:scale-[1.02] active:scale-95">
                    Publish Article
                </button>
            </form>
        </div>

        <!-- Manage Existing Posts -->
        <div class="bg-white rounded-[2.5rem] p-10 bubble-shadow mt-12">
            <h2 class="text-2xl font-bold mb-6">Manage Existing Posts</h2>
            <div id="admin-post-list" class="space-y-4">
                <p class="text-center font-medium text-on-surface-variant">Loading posts...</p>
            </div>
        </div>
    </div>

    <script>
        // Initialize Quill Rich Text Editor
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [2, 3, 4, false] }],
                    ['bold', 'italic', 'underline', 'strike'],        
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['link', 'image'],
                    ['clean']                                         
                ]
            }
        });

        let currentEditId = null;

        // Preview selected image locally before uploading
        document.getElementById('featured_image_file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('image-preview').classList.remove('hidden');
                    document.getElementById('image-preview-img').src = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        function checkAuth() {
            const pass = document.getElementById('admin-passcode').value;
            if (pass === 'admin123' || pass === 'pool123') { // Simple hardcoded check
                const overlay = document.getElementById('login-overlay');
                overlay.classList.add('opacity-0', 'pointer-events-none');
                setTimeout(() => overlay.remove(), 500);
                loadManagePosts(); // Load the post list dynamically
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        // Allow pressing enter to login
        document.getElementById('admin-passcode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkAuth();
        });

        async function loadManagePosts() {
            const list = document.getElementById('admin-post-list');
            const { data, error } = await supabaseClient.from('posts').select('*').order('created_at', { ascending: false });
            
            if (error) {
                list.innerHTML = `<p class="text-red-500 font-bold">Error loading posts: ${error.message}</p>`;
                return;
            }

            if (!data || data.length === 0) {
                list.innerHTML = `<p class="text-on-surface-variant italic">No posts found.</p>`;
                return;
            }

            list.innerHTML = '';
            data.forEach(post => {
                const item = document.createElement('div');
                item.className = 'flex justify-between items-center p-5 bg-surface rounded-2xl transition hover:-translate-y-1';
                item.innerHTML = `
                    <div class="pr-4">
                        <strong class="text-secondary text-lg block">${post.title}</strong>
                        <span class="text-xs font-bold uppercase ${post.status === 'published' ? 'text-green-500' : 'text-orange-500'}">${post.status}</span>
                    </div>
                    <div class="flex gap-2 flex-shrink-0">
                        <button onclick='editPost(${JSON.stringify(post).replace(/'/g, "&apos;")})' class="bg-primary/10 text-primary hover:bg-primary hover:text-white px-4 py-2 rounded-full font-bold text-sm transition">Edit</button>
                        <button onclick="deletePost('${post.id}')" class="bg-red-100 text-red-600 hover:bg-red-600 hover:text-white px-4 py-2 rounded-full font-bold text-sm transition">Delete</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        async function triggerJsonSync() {
            try {
                // 1. Fetch updated posts straight from the database
                const { data: posts, error: fetchErr } = await supabaseClient
                    .from('posts')
                    .select('*')
                    .eq('status', 'published')
                    .order('created_at', { ascending: false });
                
                if (fetchErr) throw fetchErr;

                // 2. Generate a fresh posts.json file in-memory
                const blob = new Blob([JSON.stringify(posts)], { type: 'application/json' });
                
                // 3. Upload it directly over to the public Cloud storage edge
                const { error: uploadErr } = await supabaseClient
                    .storage
                    .from('blog-images')
                    .upload('posts.json', blob, {
                        cacheControl: '10',  
                        upsert: true
                    });
                
                if (uploadErr) throw uploadErr;
                
                return true;
            } catch (err) {
                console.error("Failed to generate and upload JSON cache:", err);
                return false;
            }
        }

        window.editPost = function(post) {
            currentEditId = post.id;
            document.getElementById('title').value = post.title;
            document.getElementById('excerpt').value = post.excerpt || '';
            
            // Set Quill content
            quill.root.innerHTML = post.content || '';
            
            // Set Image
            document.getElementById('featured_image_url').value = post.featured_image || '';
            if (post.featured_image) {
                document.getElementById('image-preview').classList.remove('hidden');
                document.getElementById('image-preview-img').src = post.featured_image;
            } else {
                document.getElementById('image-preview').classList.add('hidden');
                document.getElementById('image-preview-img').src = '';
            }
            document.getElementById('featured_image_file').value = '';
            
            const btn = document.getElementById('submit-btn');
            btn.innerText = 'Update Article';
            btn.classList.add('bg-orange-500', 'hover:bg-orange-600'); // distinct color for edit
            
            document.getElementById('status-message').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.deletePost = async function(id) {
            if (!confirm('Are you absolutely sure you want to delete this post? This cannot be undone.')) return;
            
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = 'Deleting...';
            
            const { error } = await supabaseClient.from('posts').delete().eq('id', id);
            
            if (error) {
                alert('Failed to delete: ' + error.message);
                btn.innerText = originalText;
            } else {
                const synced = await triggerJsonSync(); // Push updated JSON to edge storage
                
                if (synced) btn.innerText = 'Deleted Successfully!';
                else btn.innerText = 'JSON Sync Failed :(';
                
                setTimeout(() => loadManagePosts(), 1000); // Refresh the list
            }
        }

        document.getElementById('post-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            const status = document.getElementById('status-message');
            
            const title = document.getElementById('title').value;
            const excerpt = document.getElementById('excerpt').value;
            const content = quill.root.innerHTML; // Get Rich Text HTML
            
            const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

            btn.innerText = currentEditId ? 'Updating...' : 'Uploading Image...';
            btn.disabled = true;
            status.classList.add('hidden');
            
            // Handle Image Upload First
            let finalImageUrl = document.getElementById('featured_image_url').value;
            const fileInput = document.getElementById('featured_image_file');
            
            if (fileInput.files.length > 0) {
                status.innerText = 'Uploading cover image...';
                status.classList.remove('hidden');
                status.className = 'mt-4 font-bold py-3 px-6 rounded-full text-center bg-blue-100 text-blue-600 block';

                const file = fileInput.files[0];
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}-${Math.random().toString(36).substring(2)}.${fileExt}`;
                
                // Upload to the 'blog-images' bucket
                const { error: uploadError } = await supabaseClient.storage.from('blog-images').upload(`covers/${fileName}`, file, { cacheControl: '3600', upsert: false });
                
                if (uploadError) {
                    status.innerText = 'Image Upload Failed: ' + uploadError.message + ' (Did you create a public bucket called "blog-images"?)';
                    status.className = 'mt-4 font-bold py-3 px-6 rounded-full text-center bg-red-100 text-red-600 block';
                    btn.disabled = false;
                    btn.innerText = currentEditId ? 'Update Article' : 'Publish Article';
                    return; // Abort submission if image upload fails
                }

                const { data: publicUrlData } = supabaseClient.storage.from('blog-images').getPublicUrl(`covers/${fileName}`);
                finalImageUrl = publicUrlData.publicUrl;
            }

            status.innerText = currentEditId ? 'Saving article...' : 'Publishing article...';
            
            let queryError;

            if (currentEditId) {
                // UPDATE logic
                const { error } = await supabaseClient
                    .from('posts')
                    .update({ title, slug, excerpt, content, featured_image: finalImageUrl || null })
                    .eq('id', currentEditId);
                queryError = error;
            } else {
                // INSERT logic
                const { error } = await supabaseClient
                    .from('posts')
                    .insert([
                        { title, slug, excerpt, content, status: 'published', featured_image: finalImageUrl || null, published_at: new Date().toISOString() }
                    ]);
                queryError = error;
            }

            btn.innerText = currentEditId ? 'Update Article' : 'Publish Article';
            btn.disabled = false;

            if (queryError) {
                status.innerText = `Error: ${queryError.message}`;
                status.className = 'mt-4 font-bold py-3 px-6 rounded-full text-center bg-red-100 text-red-600 block';
            } else {
                status.innerText = 'Pushing to static storage...';
                status.className = 'mt-4 font-bold py-3 px-6 rounded-full text-center bg-blue-100 text-blue-600 block';
                
                // Immediately import/rewrite JSON across the Cloud
                await triggerJsonSync();

                status.innerText = currentEditId ? 'Article updated successfully!' : 'Article published successfully!';
                status.className = 'mt-4 font-bold py-3 px-6 rounded-full text-center bg-green-100 text-green-600 block';
                
                // Reset form state
                document.getElementById('post-form').reset();
                quill.root.innerHTML = '';
                document.getElementById('featured_image_url').value = '';
                document.getElementById('image-preview').classList.add('hidden');
                document.getElementById('image-preview-img').src = '';
                
                currentEditId = null;
                btn.innerText = 'Publish Article';
                btn.classList.remove('bg-orange-500', 'hover:bg-orange-600');
                
                // Refresh list
                loadManagePosts();
            }
        });
    </script>
</body>
</html>
